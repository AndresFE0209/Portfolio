<section class="login">
    <div class="login-caja">
        <h1>Acceso Admin</h1>

        <mat-form-field class="campo">
            <mat-label>Email</mat-label>
            <input
                matInput
                type="email"
                [(ngModel)]="email"
                name="email"
                placeholder="admin@correo.com" />
        </mat-form-field>

        <mat-form-field class="campo">
            <mat-label>Password</mat-label>
            <input
                matInput
                type="password"
                [(ngModel)]="password"
                name="password"
                placeholder="Tu password" />
        </mat-form-field>

        <button
            mat-raised-button
            color="primary"
            (click)="entrar()"
            [disabled]="cargando"
            class="boton">
            @if (!cargando) { Entrar } @else { Cargando... }
        </button>

        @if (error) {
            <p class="error">{{ error }}</p>
        }
    </div>
</section>
